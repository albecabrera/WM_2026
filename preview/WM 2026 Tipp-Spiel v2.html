<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>WM 2026 Tipp-Spiel · ESG Bonn</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&display=swap" rel="stylesheet" />
<style>
  :root {
    --c-bg:        #0a0e1a;
    --c-surface:   #111827;
    --c-surface2:  #1a2235;
    --c-border:    rgba(255,255,255,0.08);
    --c-border2:   rgba(255,255,255,0.15);
    --c-gold:      #f5c842;
    --c-gold-dim:  #c49a1a;
    --c-green:     #22c55e;
    --c-red:       #ef4444;
    --c-blue:      #3b82f6;
    --c-text:      #f1f5f9;
    --c-muted:     #94a3b8;
    --c-hint:      #475569;
    --font-display: 'Bebas Neue', sans-serif;
    --font-body:    'DM Sans', sans-serif;
    --r-sm: 8px; --r-md: 12px; --r-lg: 16px; --r-xl: 24px;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }
  body {
    background: var(--c-bg); color: var(--c-text);
    font-family: var(--font-body); font-size: 16px; line-height: 1.6; min-height: 100vh;
    -webkit-font-smoothing: antialiased;
  }
  body::before {
    content: ''; position: fixed; inset: 0; z-index: 0; pointer-events: none;
    background:
      radial-gradient(ellipse 80% 50% at 20% 10%, rgba(245,200,66,0.06) 0%, transparent 60%),
      radial-gradient(ellipse 60% 40% at 80% 80%, rgba(59,130,246,0.06) 0%, transparent 60%);
  }
  h1,h2,h3,h4 { font-family: var(--font-display); letter-spacing: 0.02em; font-weight: 400; }
  h1 { font-size: clamp(2.8rem, 7vw, 4.8rem); line-height: 1; }
  h2 { font-size: clamp(1.9rem, 4vw, 2.7rem); line-height: 1.05; }
  h3 { font-size: clamp(1.4rem, 2.5vw, 1.9rem); }
  h4 { font-size: 1.25rem; }

  .container { max-width: 1080px; margin: 0 auto; padding: 0 1.5rem; }
  .relative { position: relative; z-index: 1; }

  .card {
    background: var(--c-surface); border: 1px solid var(--c-border);
    border-radius: var(--r-lg); padding: 1.5rem;
  }

  .btn {
    display: inline-flex; align-items: center; gap: 8px;
    padding: 0.65rem 1.5rem; border-radius: var(--r-sm);
    font-family: var(--font-body); font-size: 0.9rem; font-weight: 600;
    cursor: pointer; border: none; transition: all 0.18s; text-decoration: none;
  }
  .btn-primary { background: var(--c-gold); color: #0a0e1a; }
  .btn-primary:hover:not(:disabled) { filter: brightness(1.08); transform: translateY(-1px); }
  .btn-ghost { background: transparent; color: var(--c-text); border: 1px solid var(--c-border2); }
  .btn-ghost:hover { background: var(--c-surface2); }
  .navbtn { padding: 0.42rem 1rem; font-size: 0.83rem; }

  .input {
    background: var(--c-surface2); border: 1px solid var(--c-border);
    border-radius: var(--r-sm); color: var(--c-text); font-family: var(--font-body);
    font-size: 1rem; padding: 0.75rem 1rem; width: 100%; transition: border-color 0.2s; outline: none;
  }
  .input:focus { border-color: var(--c-gold); box-shadow: 0 0 0 3px rgba(245,200,66,0.12); }
  .input::placeholder { color: var(--c-hint); }

  .score-input {
    width: 3.4rem; text-align: center; font-family: var(--font-display);
    font-size: 1.7rem; background: var(--c-surface2); border: 1px solid var(--c-border);
    border-radius: var(--r-sm); color: var(--c-text); padding: 0.35rem; outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
  }
  .score-input:focus { border-color: var(--c-gold); box-shadow: 0 0 0 3px rgba(245,200,66,0.1); }
  .score-input:disabled { opacity: 0.5; }
  /* spinner ausblenden */
  .score-input::-webkit-outer-spin-button, .score-input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }

  .badge {
    display: inline-block; padding: 0.22rem 0.6rem; border-radius: 100px;
    font-size: 0.72rem; font-weight: 700; letter-spacing: 0.04em; text-transform: uppercase;
    white-space: nowrap;
  }
  .badge-gold  { background: rgba(245,200,66,0.15); color: var(--c-gold); }
  .badge-green { background: rgba(34,197,94,0.15);  color: var(--c-green); }
  .badge-blue  { background: rgba(59,130,246,0.15); color: var(--c-blue); }
  .badge-muted { background: rgba(255,255,255,0.06); color: var(--c-muted); }
  .badge-red   { background: rgba(239,68,68,0.15);  color: var(--c-red); }

  .nav {
    position: sticky; top: 0; z-index: 100;
    background: rgba(10,14,26,0.82); backdrop-filter: blur(20px);
    border-bottom: 1px solid var(--c-border);
  }

  .table { width: 100%; border-collapse: collapse; }
  .table th {
    font-family: var(--font-display); font-size: 0.85rem; letter-spacing: 0.08em;
    color: var(--c-muted); text-align: left; padding: 0.85rem 1rem;
    border-bottom: 1px solid var(--c-border); white-space: nowrap;
  }
  .table td { padding: 0.9rem 1rem; border-bottom: 1px solid var(--c-border); font-size: 0.95rem; }
  .table tr:last-child td { border-bottom: none; }
  .table tbody tr:hover td { background: rgba(255,255,255,0.02); }

  .rank-1 { color: #ffd700; } .rank-2 { color: #c0c0c0; } .rank-3 { color: #cd7f32; }

  ::-webkit-scrollbar { width: 7px; height: 7px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--c-hint); border-radius: 4px; }

  .match-card {
    background: var(--c-surface); border: 1px solid var(--c-border);
    border-radius: var(--r-md); padding: 1.25rem; transition: border-color 0.2s, transform 0.2s;
  }
  .match-card:hover { border-color: var(--c-border2); }
  .match-card.has-tip { border-color: rgba(245,200,66,0.35); box-shadow: 0 0 0 1px rgba(245,200,66,0.12); }
  .match-card.locked { opacity: 0.62; }

  .vs { font-family: var(--font-display); font-size: 1.4rem; color: var(--c-hint); }

  /* Gruppen-Tabs */
  .group-tabs { display: flex; flex-wrap: wrap; gap: 7px; }
  .gtab {
    min-width: 40px; padding: 0.4rem 0.6rem; border-radius: var(--r-sm);
    border: 1px solid var(--c-border); background: transparent; color: var(--c-muted);
    cursor: pointer; font-family: var(--font-display); font-size: 1.1rem; letter-spacing: 0.04em;
    transition: all 0.15s; white-space: nowrap;
  }
  .gtab:hover { border-color: var(--c-border2); color: var(--c-text); }
  .gtab.active { border-color: var(--c-gold); background: rgba(245,200,66,0.12); color: var(--c-gold); }
  .gtab.pill { border-radius: 100px; }

  /* Admin-Tabs */
  .admin-tabs { display: flex; gap: 6px; border-bottom: 1px solid var(--c-border); overflow-x: auto; }
  .atab {
    padding: 0.7rem 1.1rem; background: none; border: none; cursor: pointer;
    color: var(--c-muted); font-family: var(--font-body); font-size: 0.9rem; font-weight: 600;
    border-bottom: 2px solid transparent; margin-bottom: -1px; transition: all 0.15s; white-space: nowrap;
  }
  .atab:hover { color: var(--c-text); }
  .atab.active { color: var(--c-gold); border-bottom-color: var(--c-gold); }

  .admin-result-row {
    display: grid; grid-template-columns: 1fr auto 1fr; align-items: center; gap: 12px;
  }
  .adm-team { display: flex; align-items: center; gap: 10px; min-width: 0; }
  .adm-team span { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

  /* Grids */
  .stat-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
  .dash-grid { display: grid; grid-template-columns: 1fr 312px; gap: 2rem; align-items: start; }
  .dash-side { position: sticky; top: 80px; }
  .admin-students-grid { display: grid; grid-template-columns: 300px 1fr; gap: 1.5rem; align-items: start; }
  .podium-cards { display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px; align-items: stretch; }

  /* Animationen */
  @keyframes fadeUp { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }
  /* Resting state is always visible; entrance only switches on if the timeline advances */
  .fade-up { opacity: 1; }
  .anim-ok .fade-up { animation: fadeUp 0.45s cubic-bezier(0.2,0.7,0.2,1) both; }
  @keyframes floatY { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-22px); } }
  @keyframes pop {
    0% { opacity: 1; transform: translate(0,0) scale(1); }
    100% { opacity: 0; transform: translate(var(--dx), var(--dy)) scale(0.4); }
  }
  @media (prefers-reduced-motion: reduce) {
    .fade-up { animation: none; }
    [style*="floatY"] { animation: none !important; }
  }

  /* Responsive */
  @media (max-width: 860px) {
    .dash-grid { grid-template-columns: 1fr; }
    .dash-side { position: static; }
    .admin-students-grid { grid-template-columns: 1fr; }
  }
  @media (max-width: 560px) {
    .container { padding: 0 1rem; }
    .card { padding: 1.15rem; }
    .stat-grid { gap: 8px; }
    .podium-cards { gap: 8px; }
    .atab { padding: 0.6rem 0.7rem; font-size: 0.82rem; }
    .navbtn { padding: 0.4rem 0.7rem; font-size: 0.78rem; }
  }
</style>
</head>
<body>
<div id="root"></div>
<script>
  // Nur animieren, wenn die Animations-Timeline wirklich läuft (sonst bleibt alles sichtbar).
  (function () {
    try {
      var c1 = document.timeline && document.timeline.currentTime;
      requestAnimationFrame(function () {
        requestAnimationFrame(function () {
          var c2 = document.timeline && document.timeline.currentTime;
          if (c1 != null && c2 != null && c2 > c1) document.body.classList.add('anim-ok');
        });
      });
    } catch (e) {}
  })();
</script>
